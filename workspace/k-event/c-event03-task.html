<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키 이벤트 실습</title>
    <style>
        input {
            outline: none;
        }
    </style>
</head>
<body>
                        <!-- autocomplete를 off 로 하면 이전에 입력했던 기록x -->
    <input type="text" placeholder="이름" autocomplete="off">
    <ul id="items"></ul>
</body>
<script>
    // 입력한 키 중, 엔터일 경우 ul안에 li태그로 입력한 문자열값을 추가한다.
    // 이 때, 작성한 값은 사라지게 한다.
    // ※ 아무것도 입력하지 않고 엔터를 치면, input에 빨간색 테두리 스타일 적용
    // 추가된 li태그 값들을 클릭하면 삭제된다.

    const inputKey = document.querySelector("input[placeholder=이름]");
    const ul = document.getElementById("items")
    const tempStyle = inputKey.style.border;
    // const items = document.querySelectorAll("ul li");
    // const li = document.createElement("li")             // 이렇게하면 li하나에 값입력하고 엔터칠때마다 초기화


    inputKey.addEventListener("keyup", (e) => {
        if(e.keyCode === 13) {
            if(!inputKey.value) {
                inputKey.style.border = "2px solid red";
                return;
            }
            // let text = `<li>${inputKey.value}</li>`;
            // ul.innerHTML += text;
            const li = document.createElement("li")  // 이렇게하면 값입력하고 엔터칠때마다 li생성 -> 계속 나옴
            li.textContent = inputKey.value;
            ul.append(li);

            inputKey.value = "";
            inputKey.style.border = tempStyle;
        }
    });
    // 동적으로 생성된 태그에는 이벤트 함수 사용이 어렵다.
    // items.forEach((item) => {
    //     item.addEventListener("click", (e) => {
    //         e.target.remove();
    //     });
    // });

    // 이벤트 위임을 사용하자
    ul.addEventListener("click", (e) => {
        if(e.target.tagName.toLowerCase() === "li"){
            e.target.remove();
        }
    });
</script>
</html>
